<!DOCTYPE html>
<html>
<head>
    <title>NER AQI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

    <h1>NORTHERN EASTERN RAILWAY (NER)</h1>

    <!-- Date & Time -->
    <div class="datetime">
        <div><strong>Date:</strong> <span id="date">--</span></div>
    <div><strong>Time:</strong> <span id="time">--</span></div>
    </div>

    <table>
        <tr>
            <td style="font-size:50px"><b>AQI</b></td>
            <td id="aqi" style="font-weight: 900;"><b>--</b></td>
            <td>0 - 500</td>
            <td style="font-size:50px">INDEX</td>
        </tr>

        <tr>
            <td>PM 2.5<br>PM 10</td>
            <td id="pm" style="font-size:30px ; font-weight: 900;"><b>--</b></td>
            <td style="font-size:30px">0 - 100</td>
            <td>µg/m³</td>
        </tr>

        <tr>
            <td style="font-size:50px"><b>SO2</b></td>
            <td id="so2" style="font-size:30px; font-weight: 900;" ><b>--</b></td>
            <td style="font-size:30px">0 - 50</td>
            <td style="font-size:30px">ppm</td>
        </tr>

        <tr>
            <td style="font-size:50px"><b>NO2</b></td>
            <td id="no2" style="font-weight: 900;"><b>--</b></td>
            <td>0 - 50</td>
            <td>ppm</td>
        </tr>

        <tr>
            <td>CO<br>CO2</td>
            <td id="co" style="font-weight: 900;"><b>--</b></td>
            <td>0 - 10</td>
            <td>ppm</td>
        </tr>

        <tr>
            <td style="font-size:50px">NOISE</td>
            <td id="noise" style="font-weight: 900;"><b>--</b></td>
            <td>0 - 70</td>
            <td>dB</td>
        </tr>

        <tr>
            <td>Temp<br>Humidity</td>
            <td id="temp" style="font-weight: 900;"><b>--</b></td>
            <td style="font-size:30px">--</td>
            <td>°C / %RH</td>
        </tr>

    </table>

</div>

<script src="script.js"></script>
</body>
</html>
