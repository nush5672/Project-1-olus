<!DOCTYPE html>
<html>
<head>
    <title>NER AQI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

    <h1>NORTHERN EASTERN RAILWAY (NER)</h1>

    <!-- Date & Time -->
    <div class="datetime">
    <div class="left">
        <strong>Date:</strong> <span id="date">--</span>
    </div>

    <div class="center">
        LGN DRM OFFICE
    </div>

    <div class="right">
        <strong>Time:</strong> <span id="time">--</span>
    </div>
</div>


    <table><b>
        <tr>
            <td style="font-size:40px">AQI</td>
            <td id="aqi" style="font-weight: 900;"><b>--</b></td>
            <td style="color: yellow;">0 - 50</td>
            <td style="font-size:40px; color: cyan;">INDEX</td>
        </tr>

        <tr>
            <td>PM 2.5</td>
            <td id="pm" style="font-size:40px ; font-weight: 900;"><b>--</b></td>
            <td style="font-size:40px; color: yellow;">0 - 60</td>
            <td style="color: cyan;">µg/m³</td>
        </tr>
        <tr>
            <td>PM 10</td>
            <td id="pmten" style="font-size:40px ; font-weight: 900;"><b>--</b></td>
            <td style="font-size:40px; color: yellow;">0 - 100</td>
            <td style="color: cyan;">µg/m³</td>
        </tr>

        <tr>
            <td style="font-size:40px">SO2</td>
            <td id="so2" style="font-size:40px; font-weight: 900;" ><b>--</b></td>
            <td style="font-size:40px; color: yellow;">0 - 80</td>
            <td style="font-size:40px; color: cyan; ">µg/m³</td>
        </tr>

        <tr>
            <td style="font-size:40px">NO2</td>
            <td id="no2" style="font-weight: 900;"><b>--</b></td>
            <td style="color: yellow;">0 - 80</td>
            <td style="color: cyan;">µg/m³</td>
        </tr>

        <tr>
            <td>CO</td>
            <td id="co" style="font-weight: 900;"><b>--</b></td>
            <td style="color: yellow;">0 - 2</td>
            <td style="color: cyan;">mg/m³</td>
        </tr>
        <tr>
            <td>CO2</td>
            <td id="co2" style="font-weight: 900;"><b>--</b></td>
            <td style="color: yellow;">400 - 1000</td>
            <td style="color: cyan;">ppm</td>
        </tr>

        <tr>
            <td style="font-size:40px">NOISE</td>
            <td id="noise" style="font-weight: 900;"><b>--</b></td>
            <td style="color: yellow;">55</td>
            <td style="color: cyan;">dB</td>
        </tr>

        <tr>
            <td>Temp</td>
            <td id="temp" style="font-weight: 900; color: #00c853;"><b>--</b></td>
            <td style="font-size:40px; color: yellow; ">20-30</td>
            <td style="color: cyan;">°C </td>
        </tr>
       <b> <tr>
            <td>Humidity</td>
            <td id="humidity" style="font-weight: 900; color: #00c853;"><b>--</b></td>
            <td style="font-size:40px; color: yellow;">30-70</td>
            <td style="color: cyan;">%RH</td>
        </tr></b>

    </table>

</div>

<script src="script.js"></script>
</body>
</html>
